name: Hello World Test

on:
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: 挨拶を出力
        run: echo "こんにちは、GitHub Actionsです"

      - name: 現在時刻を表示
        run: date

      - name: Python環境をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pythonバージョン確認
        run: python --version

      - name: Pythonスクリプトを実行
        run: python scripts/hello.py
        
