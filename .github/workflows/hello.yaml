name: Hello World Test

on:
  workflow_dispatch:

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: 挨拶を出力
        run: echo "こんにちは、GitHub Actionsです"

      - name: 現在時刻を表示
        run: date

      - name: Python環境をセットアップ
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Pythonバージョン確認
        run: python --version

      - name: Pythonスクリプトを実行
        run: python scripts/hello.py

      - name: 依存パッケージをインストール
        run: pip install openai

      - name: DeepSeek APIテスト
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/deepseek_test.py
